services:
  - type: web
    name: gestao-fabio-api
    runtime: python
    buildCommand: pip install -r requirements-server.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENABLE_WHISPER
        value: false
      - key: DB_PATH
        value: /tmp/gestao.db
      - key: TEMP_DIR
        value: /tmp
      - key: ALLOWED_ORIGINS
        value: http://localhost:5173
